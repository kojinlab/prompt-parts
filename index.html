<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="よく使うAIプロンプト指示をパーツ化して、選んで組み立てて、すぐコピーできるPWA。"
    />
    <meta name="theme-color" content="#111827" />
    <title>Prompt Parts</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand-lockup">
        <img src="./icon.svg" alt="" aria-hidden="true" />
        <div>
          <p class="eyebrow">Prompt Parts</p>
          <h1>指示をパーツで積む。</h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="secondary" id="exportButton" type="button">書き出し</button>
        <label class="secondary file-button">
          読み込み
          <input id="importInput" type="file" accept="application/json" />
        </label>
      </div>
    </header>

    <main>
      <section class="composer-panel" aria-label="完成プロンプト">
        <div class="panel-head">
          <div>
            <h2>完成プロンプト</h2>
            <p>下のパーツをワンタップで足しながら、ここを直接編集できます</p>
          </div>
          <div class="copy-row">
            <button id="copyButton" type="button">コピー</button>
            <button class="ghost" id="clearButton" type="button">クリア</button>
            <span id="copyStatus" role="status" aria-live="polite"></span>
          </div>
        </div>

        <textarea
          id="outputText"
          rows="7"
          spellcheck="false"
          placeholder="パーツを追加するとここに積み上がります。ここに直接書き足してもOK。"
        ></textarea>

        <div class="selected-strip" id="selectedList"></div>
        <div class="quick-note">
          <input id="memoInput" placeholder="今回だけ足したい前提や依頼を入力して Enter" />
          <button class="secondary" id="memoAddButton" type="button">メモ追加</button>
        </div>
      </section>

      <div class="app-shell">
        <aside class="sidebar" aria-label="カテゴリ">
          <button class="category active" data-category="all" type="button">すべて</button>
          <button class="category" data-category="clarification" type="button">確認質問</button>
          <button class="category" data-category="flow" type="button">進行制御</button>
          <button class="category" data-category="quality" type="button">品質担保</button>
          <button class="category" data-category="format" type="button">出力形式</button>
          <button class="category" data-category="coding" type="button">開発</button>
          <button class="category" data-category="business" type="button">事業評価</button>
          <button class="category" data-category="sns" type="button">SNS</button>
          <button class="category" data-category="research" type="button">調査</button>
          <button class="category" data-category="image" type="button">画像生成</button>
          <button class="category" data-category="safety" type="button">制約</button>
        </aside>

        <section class="panel library">
          <div class="panel-head">
            <div>
              <h2>パーツライブラリ</h2>
              <p>押すだけで上の完成プロンプトに追加</p>
            </div>
            <input id="searchInput" type="search" placeholder="検索" autocomplete="off" />
          </div>
          <div class="bundle-list" id="bundleList"></div>
          <div class="parts-list" id="partsList"></div>
        </section>

        <section class="panel editor">
          <div class="panel-head">
            <div>
              <h2>新規パーツ</h2>
              <p>リサーチで見つけた型もここに登録</p>
            </div>
          </div>
          <form id="partForm">
            <label class="field">
              <span>タイトル</span>
              <input id="titleInput" required placeholder="例: まず質問して" />
            </label>
            <label class="field">
              <span>カテゴリ</span>
              <select id="categoryInput">
                <option value="clarification">確認質問</option>
                <option value="flow">進行制御</option>
                <option value="quality">品質担保</option>
                <option value="format">出力形式</option>
                <option value="coding">開発</option>
                <option value="business">事業評価</option>
                <option value="sns">SNS</option>
                <option value="research">調査</option>
                <option value="image">画像生成</option>
                <option value="safety">制約</option>
              </select>
            </label>
            <label class="field">
              <span>本文</span>
              <textarea id="bodyInput" required rows="8" placeholder="AIに渡したい指示を書く"></textarea>
            </label>
            <button type="submit">保存して追加</button>
          </form>
        </section>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
