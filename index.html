<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="よく使うAIプロンプト指示をパーツ化して、選んで組み立てて、すぐコピーできるPWA。"
    />
    <meta name="theme-color" content="#0f766e" />
    <title>Prompt Parts</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Prompt Parts</p>
        <h1>AIへの定番指示を、選んで組み立てる。</h1>
      </div>
      <div class="header-actions">
        <button class="secondary" id="exportButton" type="button">書き出し</button>
        <label class="secondary file-button">
          読み込み
          <input id="importInput" type="file" accept="application/json" />
        </label>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar" aria-label="カテゴリ">
        <button class="category active" data-category="all" type="button">すべて</button>
        <button class="category" data-category="flow" type="button">進行制御</button>
        <button class="category" data-category="quality" type="button">品質担保</button>
        <button class="category" data-category="format" type="button">出力形式</button>
        <button class="category" data-category="coding" type="button">開発</button>
        <button class="category" data-category="business" type="button">事業評価</button>
        <button class="category" data-category="sns" type="button">SNS</button>
      </aside>

      <section class="panel library">
        <div class="panel-head">
          <div>
            <h2>パーツ</h2>
            <p>クリックで右側に追加</p>
          </div>
          <input id="searchInput" type="search" placeholder="検索" autocomplete="off" />
        </div>
        <div class="parts-list" id="partsList"></div>
      </section>

      <section class="panel composer">
        <div class="panel-head">
          <div>
            <h2>組み立て</h2>
            <p>並び替えと編集ができます</p>
          </div>
          <button class="ghost" id="clearButton" type="button">クリア</button>
        </div>

        <div class="selected-list" id="selectedList"></div>

        <label class="field">
          <span>追加メモ</span>
          <textarea id="memoInput" rows="4" placeholder="今回だけ足したい前提や依頼を書く"></textarea>
        </label>

        <label class="field">
          <span>完成プロンプト</span>
          <textarea id="outputText" rows="12" spellcheck="false"></textarea>
        </label>

        <div class="copy-row">
          <button id="copyButton" type="button">コピー</button>
          <span id="copyStatus" role="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="panel editor">
        <div class="panel-head">
          <div>
            <h2>新規パーツ</h2>
            <p>自分用の指示を足す</p>
          </div>
        </div>
        <form id="partForm">
          <label class="field">
            <span>タイトル</span>
            <input id="titleInput" required placeholder="例: まず質問して" />
          </label>
          <label class="field">
            <span>カテゴリ</span>
            <select id="categoryInput">
              <option value="flow">進行制御</option>
              <option value="quality">品質担保</option>
              <option value="format">出力形式</option>
              <option value="coding">開発</option>
              <option value="business">事業評価</option>
              <option value="sns">SNS</option>
            </select>
          </label>
          <label class="field">
            <span>本文</span>
            <textarea id="bodyInput" required rows="7" placeholder="AIに渡したい指示を書く"></textarea>
          </label>
          <button type="submit">パーツを追加</button>
        </form>

        <div class="import-box">
          <div class="panel-head compact">
            <div>
              <h2>Markdown取り込み</h2>
              <p>GitHub READMEやraw Markdownから候補を追加</p>
            </div>
          </div>
          <label class="field">
            <span>URL</span>
            <input id="markdownUrlInput" placeholder="https://github.com/user/repo または raw URL" />
          </label>
          <label class="field">
            <span>取り込みカテゴリ</span>
            <select id="markdownCategoryInput">
              <option value="flow">進行制御</option>
              <option value="quality">品質担保</option>
              <option value="format">出力形式</option>
              <option value="coding">開発</option>
              <option value="business">事業評価</option>
              <option value="sns">SNS</option>
            </select>
          </label>
          <button id="markdownImportButton" type="button">候補を取り込む</button>
          <p class="import-note" id="markdownImportStatus" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
